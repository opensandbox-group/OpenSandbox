name: Ingress Tests

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'components/ingress/**'
      - 'components/internal/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.9'

      - name: Check gofmt
        working-directory: components/ingress
        run: |
          files="$(gofmt -l . ../internal)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Run golint
        working-directory: components/ingress
        run: |
          make golint

      - name: Run Build
        working-directory: components/ingress
        run: |
          make build

      - name: Run tests
        working-directory: components/ingress
        run: |
          make test
